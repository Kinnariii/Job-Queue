version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: jobqueue
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: node src/server.js
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/jobqueue
      REDIS_URL: redis://redis:6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: node src/workers/worker.js
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/jobqueue
      REDIS_URL: redis://redis:6379
      MAX_RETRIES: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Scale workers with: docker compose up --scale worker=3
    deploy:
      replicas: 1

volumes:
  pgdata:
